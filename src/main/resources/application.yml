server:
  port: 8080
  servlet:
    context-path: /

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/lost_found?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 3000ms
  mvc:
    view:
      prefix: /WEB-INF/jsp/
      suffix: .jsp
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

  # ===== 可选服务（不安装也能正常运行） =====

  # RabbitMQ：未安装时消费者不自动启动，避免日志刷屏
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    listener:
      simple:
        auto-startup: false       # 未安装RabbitMQ时不启动消费者
        acknowledge-mode: manual
        retry:
          enabled: false

  # 邮件服务：默认关闭，需要时改为 true 并配置邮箱
  mail:
    host: smtp.qq.com
    port: 587
    username: placeholder@qq.com
    password: placeholder
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # Elasticsearch：未安装时自动降级为MySQL模糊查询
  elasticsearch:
    uris: http://localhost:9200
    connection-timeout: 5s
    socket-timeout: 30s

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: CampusLostFoundSecretKey2026CampusLostFoundSecretKey2026
  expiration: 86400000

file:
  upload-path: D:/uploads/lost-found/
  access-path: /upload/

# ===== AI 微服务（可选，未启动时自动降级为TF-IDF） =====
ai:
  service:
    url: http://localhost:8001
    timeout: 5000
    enabled: true

# ===== 多模态匹配权重 =====
matching:
  weights:
    text: 0.4
    image: 0.4
    location: 0.2
  threshold: 0.3

# ===== 高德地图（可选，前端地图功能） =====
amap:
  key: your-amap-js-api-key

# ===== 信用积分规则 =====
credit:
  rules:
    publish-found: 10
    claim-success: 20
    malicious: -30
    initial-score: 100

# ===== 邮件通知开关 =====
mail:
  notify:
    enabled: false

# ===== Swagger API 文档 =====
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html
    operationsSorter: method

logging:
  level:
    com.campus.lostfound: info
